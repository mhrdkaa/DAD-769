<!DOCTYPE html>
<html>

<head>
    <title>Secret Photo Album</title>
</head>

<body>

    <h1>Secret Photo Album</h1>
    <div id="login">
        <p>Login required to view secret images.</p>
        <button onclick="login()">Login</button>
    </div>
    <div id="content" style="display:none;">
        <p>Welcome! Here's your secret image:</p>
        <img id="secretImg" src="https://dad-769.vercel.app/secret/poc.png" width="300">
    </div>

    <script>
        function login() {
            document.cookie = "auth=1; path=/";
            location.reload();
        }

        function isLoggedIn() {
            return document.cookie.includes("auth=1");
        }

        if (isLoggedIn()) {
            document.getElementById("login").style.display = "none";
            document.getElementById("content").style.display = "block";
        }
    </script>

</body>

</html>
